name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          AABFE1: ${{ secrets.AABFE1 }}
          B3740C: ${{ secrets.B3740C }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('AABFE1', '')
          tag_b = os.environ.get('B3740C', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 9378e970178e9da7aef47bdd92d8a918e6c75dab83f6a7 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- a1bf6a456fc1d4e4d404f2233136c921ec -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
